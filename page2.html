<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relationship Compatibility Test</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #ffebee;
            color: #d32f2f;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        h1 {
            color: #c2185b;
            margin-bottom: 30px;
        }
        .heart {
            font-size: 50px;
            color: #e91e63;
            margin: 20px 0;
            animation: pulse 1.5s infinite;
        }
        .form-group {
            margin: 20px 0;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #c2185b;
        }
        input, select {
            width: 100%;
            padding: 10px;
            border: 2px solid #ffcdd2;
            border-radius: 8px;
            font-size: 16px;
        }
        button {
            background-color: #e91e63;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
        }
        button:hover {
            background-color: #c2185b;
            transform: scale(1.05);
        }
        #result {
            display: none;
            margin-top: 30px;
            padding: 20px;
            background-color: #f8bbd0;
            border-radius: 10px;
            animation: fadeIn 1s;
        }
        .compatibility-score {
            font-size: 24px;
            font-weight: bold;
            color: #e91e63;
            margin: 20px 0;
        }
        .progress-bar {
            height: 30px;
            background-color: #ffcdd2;
            border-radius: 15px;
            margin: 20px 0;
            overflow: hidden;
        }
        .progress {
            height: 100%;
            background-color: #e91e63;
            width: 0;
            transition: width 2s;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>❤️ Relationship Compatibility Test ❤️</h1>
        <div class="heart">♥</div>
        
        <div class="form-group">
            <label for="name1">Your Name:</label>
            <input type="text" id="name1" placeholder="Enter your name">
        </div>
        
        <div class="form-group">
            <label for="name2">Partner's Name:</label>
            <input type="text" id="name2" placeholder="Enter your partner's name">
        </div>
        
        <div class="form-group">
            <label for="zodiac1">Your Zodiac Sign:</label>
            <select id="zodiac1">
                <option value="">Select your sign</option>
                <option value="aries">Aries ♈</option>
                <option value="taurus">Taurus ♉</option>
                <option value="gemini">Gemini ♊</option>
                <option value="cancer">Cancer ♋</option>
                <option value="leo">Leo ♌</option>
                <option value="virgo">Virgo ♍</option>
                <option value="libra">Libra ♎</option>
                <option value="scorpio">Scorpio ♏</option>
                <option value="sagittarius">Sagittarius ♐</option>
                <option value="capricorn">Capricorn ♑</option>
                <option value="aquarius">Aquarius ♒</option>
                <option value="pisces">Pisces ♓</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="zodiac2">Partner's Zodiac Sign:</label>
            <select id="zodiac2">
                <option value="">Select partner's sign</option>
                <option value="aries">Aries ♈</option>
                <option value="taurus">Taurus ♉</option>
                <option value="gemini">Gemini ♊</option>
                <option value="cancer">Cancer ♋</option>
                <option value="leo">Leo ♌</option>
                <option value="virgo">Virgo ♍</option>
                <option value="libra">Libra ♎</option>
                <option value="scorpio">Scorpio ♏</option>
                <option value="sagittarius">Sagittarius ♐</option>
                <option value="capricorn">Capricorn ♑</option>
                <option value="aquarius">Aquarius ♒</option>
                <option value="pisces">Pisces ♓</option>
            </select>
        </div>
        
        <button onclick="calculateCompatibility()">Test Our Compatibility</button>
        
        <div id="result">
            <h2>Compatibility Results</h2>
            <div class="heart">♥</div>
            <p id="names-result"></p>
            <div class="compatibility-score" id="score">98%</div>
            <div class="progress-bar">
                <div class="progress" id="progress-bar"></div>
            </div>
            <p id="message">This is an extraordinary match! The stars align perfectly for you two!</p>
            <p id="zodiac-compatibility"></p>
        </div>
    </div>

    <script>
    function calculateCompatibility() {
        // Get input values
        const name1 = document.getElementById('name1').value || "Partner 1";
        const name2 = document.getElementById('name2').value || "Partner 2";
        const zodiac1 = document.getElementById('zodiac1').value || "unknown sign";
        const zodiac2 = document.getElementById('zodiac2').value || "unknown sign";
        
        // Always show high compatibility (rigged)
        const compatibility = 95 + Math.floor(Math.random() * 5); // Always between 95-99%
        
        // Display results - HARDCODED NAMES (changed this line)
        document.getElementById('names-result').textContent = 
            `Carter ♥ Lindley`;  // This will always show these names
        
        document.getElementById('score').textContent = `${compatibility}%`;
        document.getElementById('progress-bar').style.width = `${compatibility}%`;
        
        // Generate positive message (always)
        const messages = [
            "This is an extraordinary match! The stars align perfectly for you two!",
            "Incredible chemistry! You're clearly meant to be together!",
            "A match made in heaven! Your connection is truly special!",
            "Perfect harmony! Your relationship is destined for greatness!",
            "Soulmates alert! Your bond is unbreakable!"
        ];
        document.getElementById('message').textContent = 
            messages[Math.floor(Math.random() * messages.length)];
        
        // Generate positive zodiac message (always)
        const zodiacMessages = [
            `The combination of ${zodiac1} and ${zodiac2} creates magical energy!`,
            `${zodiac1} and ${zodiac2} together? A power couple in the making!`,
            `Astrologers agree: ${zodiac1} + ${zodiac2} = perfect match!`,
            `Your ${zodiac1}-${zodiac2} pairing is exceptionally rare and beautiful!`,
            `The stars confirm: ${zodiac1} and ${zodiac2} have cosmic compatibility!`
        ];
        document.getElementById('zodiac-compatibility').textContent = 
            zodiacMessages[Math.floor(Math.random() * zodiacMessages.length)];
        
        // Show results
        document.getElementById('result').style.display = 'block';
        
        // Scroll to results
        document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
    }
</script>
</body>
</html>
